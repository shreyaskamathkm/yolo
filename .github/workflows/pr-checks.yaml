name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR version
        id: pr_version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get main version
        id: main_version
        run: |
          git fetch origin main
          VERSION=$(git show origin/main:pyproject.toml | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify version was bumped
        run: |
          PR_VER="${{ steps.pr_version.outputs.version }}"
          MAIN_VER="${{ steps.main_version.outputs.version }}"
          echo "main version : $MAIN_VER"
          echo "PR version   : $PR_VER"
          if [ "$PR_VER" = "$MAIN_VER" ]; then
            echo "ERROR: Version not bumped. Update version in pyproject.toml before merging."
            exit 1
          fi
          echo "Version bumped: $MAIN_VER -> $PR_VER"

  build_and_test:
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}-3.10
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: make install

      - name: Cache pre-commit environment
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-precommit-${{ hashFiles('**/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-precommit-

      - name: Lint
        run: make lint

      - name: Test
        run: make test
